name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      # ffmpeg/ffprobe synthesize the test clips and drive frame/audio extraction;
      # yt-dlp must be on PATH because download.py gates on `shutil.which("yt-dlp")`
      # before building argv (the tests stub subprocess, not the which() check).
      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # pytest pinned for reproducible CI. yt-dlp floats: tests stub the network,
      # so a fresh yt-dlp only satisfies download.py's `shutil.which` gate and
      # keeps the `--version` smoke check meaningful. Bump pytest when convenient.
      - name: Install Python deps
        run: python -m pip install --upgrade pip "pytest==8.4.1" yt-dlp

      - name: Verify tools
        run: |
          ffmpeg -version | head -1
          ffprobe -version | head -1
          yt-dlp --version

      - name: Run tests
        run: python -m pytest -q
